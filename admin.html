<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin — Manage My Work | Bash Arts</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --ink: #1a1025;
            --cream: #fdf8f0;
            --warm: #fff8ee;
            --a1: #e8623a;
            --a2: #7c3aed;
            --a3: #0ea5e9;
            --a4: #f59e0b;
            --a5: #10b981;
            --lpur: #f3eeff;
            --lblu: #f0f9ff;
            --serif: 'Georgia', 'Times New Roman', serif;
            --sans: 'Helvetica Neue', Arial, sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--sans);
            color: var(--ink);
            background: var(--warm);
            min-height: 100vh;
        }

        /* ── LOGIN GATE ── */
        #gate {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .gate-card {
            background: #fff;
            border-radius: 0.75rem;
            padding: clamp(1.75rem, 5vw, 2.5rem);
            max-width: 360px;
            width: 100%;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .gate-card h1 {
            font-family: var(--serif);
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
        }

        .gate-card p {
            font-size: 0.85rem;
            color: #777;
            margin-bottom: 1.5rem;
        }

        .gate-card input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--lpur);
            border-radius: 0.4rem;
            font-size: 0.95rem;
            margin-bottom: 0.85rem;
            outline: none;
        }

        .gate-card input:focus {
            border-color: var(--a2);
        }

        .gate-card button {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 0.4rem;
            background: var(--a2);
            color: #fff;
            font-size: 0.85rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            font-weight: 600;
        }

        .gate-card button:hover {
            opacity: 0.9;
        }

        .gate-error {
            color: #dc2626;
            font-size: 0.8rem;
            margin-top: 0.75rem;
            display: none;
        }

        /* ── ADMIN APP ── */
        #app {
            display: none;
            max-width: 880px;
            margin: 0 auto;
            padding: clamp(1.5rem, 5vw, 3rem) 5vw 5rem;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .admin-header h1 {
            font-family: var(--serif);
            font-size: clamp(1.4rem, 4vw, 1.8rem);
        }

        .admin-header p {
            color: #777;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        .back-link {
            font-size: 0.8rem;
            color: var(--a2);
            text-decoration: none;
            font-weight: 600;
        }

        .panel {
            background: #fff;
            border-radius: 0.75rem;
            padding: clamp(1.5rem, 4vw, 2rem);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.06);
            margin-bottom: 2rem;
        }

        .panel h2 {
            font-family: var(--serif);
            font-size: 1.15rem;
            margin-bottom: 1.1rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.85rem;
        }

        .form-grid .full {
            grid-column: 1/-1;
        }

        .form-grid label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #888;
            display: block;
            margin-bottom: 0.3rem;
        }

        .form-grid input,
        .form-grid select,
        .form-grid textarea {
            width: 100%;
            padding: 0.7rem 0.9rem;
            border: 2px solid var(--lpur);
            border-radius: 0.4rem;
            background: #faf8ff;
            font-family: var(--sans);
            font-size: 0.88rem;
            color: var(--ink);
            outline: none;
            resize: none;
        }

        .form-grid input:focus,
        .form-grid select:focus,
        .form-grid textarea:focus {
            border-color: var(--a2);
            background: #fff;
        }

        .field {
            margin-bottom: 0;
        }

        .preview-wrap {
            grid-column: 1/-1;
            margin-top: 0.25rem;
        }

        .preview-wrap img {
            max-width: 160px;
            max-height: 160px;
            border-radius: 0.4rem;
            display: none;
            object-fit: cover;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        }

        .submit-row {
            grid-column: 1/-1;
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.4rem;
        }

        .add-btn {
            padding: 0.8rem 1.75rem;
            border: none;
            border-radius: 0.4rem;
            background: var(--a1);
            color: #fff;
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
        }

        .add-btn:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        .add-btn:disabled {
            opacity: 0.6;
            cursor: default;
        }

        .status-msg {
            font-size: 0.85rem;
            display: none;
        }

        .status-msg.success {
            color: #065f46;
        }

        .status-msg.error {
            color: #991b1b;
        }

        .work-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .work-row {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            padding: 0.6rem;
            border: 1px solid #f1ebff;
            border-radius: 0.5rem;
        }

        .work-row img {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: 0.35rem;
            background: #eee;
            flex-shrink: 0;
        }

        .work-row-info {
            flex: 1;
            min-width: 0;
        }

        .work-row-title {
            font-size: 0.88rem;
            font-weight: 600;
        }

        .work-row-meta {
            font-size: 0.74rem;
            color: #888;
        }

        .work-row-badge {
            font-size: 0.62rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.18rem 0.5rem;
            border-radius: 2rem;
            background: var(--lpur);
            color: var(--a2);
            flex-shrink: 0;
        }

        .delete-btn {
            border: none;
            background: #fef2f2;
            color: #dc2626;
            font-size: 0.72rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            padding: 0.4rem 0.7rem;
            border-radius: 0.35rem;
            cursor: pointer;
            flex-shrink: 0;
            font-weight: 600;
        }

        .delete-btn:hover {
            background: #fee2e2;
        }

        .empty-note,
        .loading-note {
            color: #999;
            font-size: 0.85rem;
            font-style: italic;
        }

        @media (max-width: 560px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div id="gate">
        <div class="gate-card">
            <h1>Bash Arts Admin</h1>
            <p>Enter your passcode to manage the My Work gallery.</p>
            <input type="password" id="passcode-input" placeholder="Passcode" autocomplete="off">
            <button onclick="checkPasscode()">Unlock</button>
            <p class="gate-error" id="gate-error">Incorrect passcode. Try again.</p>
        </div>
    </div>

    <div id="app">
        <div class="admin-header">
            <div>
                <h1>Manage My Work</h1>
                <p>Add a new piece and it appears instantly on the site's My Work tab.</p>
            </div>
            <a class="back-link" href="index.html">&larr; Back to site</a>
        </div>

        <div class="panel">
            <h2>Add a new piece</h2>
            <div class="form-grid">
                <div class="field full">
                    <label>Photo of the drawing</label>
                    <input type="file" id="f-image" accept="image/*" onchange="previewImage()">
                </div>
                <div class="preview-wrap">
                    <img id="f-preview" alt="Preview">
                </div>
                <div class="field">
                    <label>Title</label>
                    <input type="text" id="f-title" placeholder="e.g. The Quiet Moment" maxlength="80">
                </div>
                <div class="field">
                    <label>Category</label>
                    <select id="f-category">
                        <option value="Portrait">Portrait</option>
                        <option value="Triptych">Triptych</option>
                        <option value="Figurative">Figurative</option>
                    </select>
                </div>
                <div class="field full">
                    <label>Caption / medium (optional)</label>
                    <input type="text" id="f-meta" placeholder="e.g. Pencil on paper · Portrait" maxlength="120">
                </div>
                <div class="submit-row">
                    <button class="add-btn" id="add-btn" onclick="addWork()">+ Add to Gallery</button>
                    <span class="status-msg" id="add-status"></span>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>Current pieces</h2>
            <div class="work-list" id="work-list">
                <p class="loading-note">Loading…</p>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const SUPABASE_URL = window.SUPABASE_URL;
        const SUPABASE_KEY = window.SUPABASE_KEY;
        const ADMIN_PASSCODE = 'bash2026'; // change this to your own passcode

        const HEADERS = {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json'
        };

        function checkPasscode() {
            const val = document.getElementById('passcode-input').value;
            if (val === ADMIN_PASSCODE) {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                sessionStorage.setItem('bashAdminUnlocked', '1');
                loadWorkList();
            } else {
                document.getElementById('gate-error').style.display = 'block';
            }
        }

        document.getElementById('passcode-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') checkPasscode();
        });

        if (sessionStorage.getItem('bashAdminUnlocked') === '1') {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            loadWorkList();
        }

        function escapeHtml(s) {
            return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function previewImage() {
            const fileInput = document.getElementById('f-image');
            const img = document.getElementById('f-preview');
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    img.src = e.target.result;
                    img.style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else {
                img.style.display = 'none';
            }
        }

        async function loadWorkList() {
            const list = document.getElementById('work-list');
            list.innerHTML = '<p class="loading-note">Loading…</p>';
            try {
                const res = await fetch(SUPABASE_URL + '/rest/v1/artworks?select=*&order=sort_order.asc', { headers: HEADERS });
                if (!res.ok) throw new Error('fetch failed');
                const data = await res.json();
                renderWorkList(data);
            } catch (e) {
                list.innerHTML = '<p class="empty-note">Could not load the gallery right now.</p>';
                console.error(e);
            }
        }

        function renderWorkList(items) {
            const list = document.getElementById('work-list');
            list.innerHTML = '';
            if (!items.length) {
                list.innerHTML = '<p class="empty-note">No pieces yet — add your first one above.</p>';
                return;
            }
            items.forEach(item => {
                const row = document.createElement('div');
                row.className = 'work-row';
                row.innerHTML = `
          <img src="${escapeHtml(item.image_url)}" alt="${escapeHtml(item.title)}">
          <div class="work-row-info">
            <div class="work-row-title">${escapeHtml(item.title)}</div>
            <div class="work-row-meta">${escapeHtml(item.meta || '')}</div>
          </div>
          <span class="work-row-badge">${escapeHtml(item.category)}</span>
          <button class="delete-btn" onclick="deleteWork(${item.id})">Delete</button>`;
                list.appendChild(row);
            });
        }

        const STORAGE_BUCKET = 'artwork-images';

        async function uploadImage(file) {
            const ext = file.name.split('.').pop().toLowerCase();
            const path = Date.now() + '-' + Math.random().toString(36).slice(2, 8) + '.' + ext;
            const res = await fetch(SUPABASE_URL + '/storage/v1/object/' + STORAGE_BUCKET + '/' + path, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': 'Bearer ' + SUPABASE_KEY,
                    'Content-Type': file.type
                },
                body: file
            });
            if (!res.ok) throw new Error('upload failed');
            return SUPABASE_URL + '/storage/v1/object/public/' + STORAGE_BUCKET + '/' + path;
        }

        async function addWork() {
            const fileInput = document.getElementById('f-image');
            const file = fileInput.files[0];
            const title = document.getElementById('f-title').value.trim();
            const category = document.getElementById('f-category').value;
            const meta = document.getElementById('f-meta').value.trim();
            const btn = document.getElementById('add-btn');
            const status = document.getElementById('add-status');

            if (!file) { fileInput.focus(); return; }
            if (!title) { document.getElementById('f-title').focus(); return; }

            btn.disabled = true;
            btn.textContent = 'Uploading…';

            try {
                const image_url = await uploadImage(file);

                const countRes = await fetch(SUPABASE_URL + '/rest/v1/artworks?select=sort_order&order=sort_order.desc&limit=1', { headers: HEADERS });
                const countData = await countRes.json();
                const nextOrder = (countData[0]?.sort_order || 0) + 1;

                btn.textContent = 'Adding…';

                const res = await fetch(SUPABASE_URL + '/rest/v1/artworks', {
                    method: 'POST',
                    headers: { ...HEADERS, 'Prefer': 'return=minimal' },
                    body: JSON.stringify({ title, category, image_url, meta, sort_order: nextOrder })
                });
                if (!res.ok) throw new Error('insert failed');

                status.textContent = '✓ Added to the gallery';
                status.className = 'status-msg success';
                status.style.display = 'inline';

                fileInput.value = '';
                document.getElementById('f-title').value = '';
                document.getElementById('f-meta').value = '';
                document.getElementById('f-preview').style.display = 'none';

                await loadWorkList();
            } catch (e) {
                status.textContent = '⚠ Something went wrong adding that piece.';
                status.className = 'status-msg error';
                status.style.display = 'inline';
                console.error(e);
            }

            btn.disabled = false;
            btn.textContent = '+ Add to Gallery';
            setTimeout(() => { status.style.display = 'none'; }, 5000);
        }

        async function deleteWork(id) {
            if (!confirm('Remove this piece from the gallery?')) return;
            try {
                const res = await fetch(SUPABASE_URL + '/rest/v1/artworks?id=eq.' + id, {
                    method: 'DELETE',
                    headers: HEADERS
                });
                if (!res.ok) throw new Error('delete failed');
                await loadWorkList();
            } catch (e) {
                alert('Could not delete that piece. Please try again.');
                console.error(e);
            }
        }
    </script>
</body>

</html>
